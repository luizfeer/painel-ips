<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Monitor de Recursos da VPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-card: rgba(15, 23, 42, 0.95);
      --bg-card-soft: rgba(15, 23, 42, 0.85);
      --border: rgba(148, 163, 184, 0.35);
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.12);
      --text: #e5e7eb;
      --text-soft: #9ca3af;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --radius-full: 999px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #1d283a 0, #020617 40%, #000 100%);
      color: var(--text);
      padding: 32px 16px;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 26px;
      flex-wrap: wrap;
    }

    .title-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px 4px;
      border-radius: var(--radius-full);
      background: var(--accent-soft);
      border: 1px solid rgba(56, 189, 248, 0.35);
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.25);
    }

    h1 {
      font-size: 24px;
      letter-spacing: -0.02em;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    h1 .sub {
      font-size: 14px;
      color: var(--text-soft);
      font-weight: 400;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.12s ease;
      text-decoration: none;
    }

    .btn-primary {
      border: 1px solid var(--accent);
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: #0b1220;
      box-shadow: 0 8px 18px rgba(56, 189, 248, 0.3);
    }

    .btn-ghost {
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text-soft);
    }

    .btn:hover { transform: translateY(-1px); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .last-update {
      font-size: 11px;
      color: #64748b;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: linear-gradient(145deg, var(--bg-card-soft), rgba(15, 23, 42, 0.98));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.08), transparent 56%);
    }

    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .hero-value {
      font-size: 44px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .hero-sub {
      color: var(--text-soft);
      font-size: 13px;
    }

    .progress-wrap {
      margin-top: 14px;
    }

    .progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--text-soft);
    }

    .progress {
      height: 11px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.16);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #22c55e, #38bdf8);
      transition: width 0.35s ease, background 0.2s ease;
    }

    .metric-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .metric-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(15, 23, 42, 0.84);
    }

    .metric-name {
      font-size: 12px;
      color: var(--text-soft);
    }

    .metric-value {
      font-size: 14px;
      font-weight: 600;
      text-align: right;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .meta-item {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(15, 23, 42, 0.84);
    }

    .meta-item .metric-name {
      margin-bottom: 6px;
      display: block;
    }

    .meta-item .metric-value {
      text-align: left;
      word-break: break-word;
    }

    .error-msg {
      padding: 24px;
      color: #f87171;
      font-size: 13px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 16px;
    }

    .stack {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .section-title h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #cbd5e1;
    }

    .section-title span {
      font-size: 12px;
      color: var(--text-soft);
    }

    .process-list {
      display: grid;
      gap: 10px;
    }

    .process-row {
      display: grid;
      grid-template-columns: minmax(180px, 1.2fr) minmax(120px, 0.9fr) minmax(120px, 0.9fr) minmax(130px, 1.6fr) minmax(130px, 1.6fr);
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(15, 23, 42, 0.84);
    }

    .process-row.header {
      background: rgba(15, 23, 42, 0.96);
      color: #94a3b8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .process-name {
      font-size: 14px;
      font-weight: 600;
    }

    .process-status {
      font-size: 11px;
      color: var(--text-soft);
      margin-top: 4px;
    }

    .process-metric {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .process-metric strong {
      font-size: 14px;
      font-weight: 700;
    }

    .process-metric span {
      font-size: 11px;
      color: var(--text-soft);
    }

    .mini-bar {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(2, 6, 23, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .mini-bar-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #22c55e, #38bdf8);
    }

    @media (max-width: 900px) {
      .top-grid,
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      header {
        align-items: flex-start;
      }

      .actions {
        width: 100%;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .hero-value {
        font-size: 36px;
      }

      .process-row {
        grid-template-columns: 1fr;
      }

      .process-row.header {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="title-group">
        <div class="badge">
          <span class="badge-dot" id="status-dot"></span>
          Monitor da VPS
        </div>
        <h1>
          Recursos do servidor
          <span class="sub" id="host-line">carregando...</span>
        </h1>
      </div>
      <div class="actions">
        <a href="/" class="btn btn-ghost">← IPs & Portas</a>
        <a href="/pm2" class="btn btn-ghost">Monitor PM2</a>
        <span class="last-update" id="last-update"></span>
        <button class="btn btn-primary" id="btn-refresh">↻ Atualizar</button>
      </div>
    </header>

    <div id="content">
      <div class="error-msg">Carregando dados da VPS...</div>
    </div>
  </div>

  <script>
    function formatBytes(bytes) {
      if (!bytes && bytes !== 0) return '—'
      const units = ['B', 'KB', 'MB', 'GB', 'TB']
      let value = bytes
      let unitIndex = 0

      while (value >= 1024 && unitIndex < units.length - 1) {
        value /= 1024
        unitIndex += 1
      }

      const decimals = value >= 10 || unitIndex === 0 ? 0 : 1
      return value.toFixed(decimals) + ' ' + units[unitIndex]
    }

    function formatUptime(seconds) {
      if (!seconds && seconds !== 0) return '—'
      const days = Math.floor(seconds / 86400)
      const hours = Math.floor((seconds % 86400) / 3600)
      const minutes = Math.floor((seconds % 3600) / 60)
      if (days > 0) return `${days}d ${hours}h`
      if (hours > 0) return `${hours}h ${minutes}m`
      return `${minutes}m`
    }

    function loadStatusColor(percent) {
      if (percent >= 85) return { color: '#ef4444', dot: '#ef4444' }
      if (percent >= 65) return { color: '#f59e0b', dot: '#f59e0b' }
      return { color: 'linear-gradient(90deg, #22c55e, #38bdf8)', dot: '#22c55e' }
    }

    function renderUsageCard(title, percent, subtitle, details) {
      const safePercent = Math.max(0, Math.min(100, Number(percent) || 0))
      const status = loadStatusColor(safePercent)

      return `
        <section class="card">
          <div class="card-label">${title}</div>
          <div class="hero-value">${safePercent.toFixed(1)}%</div>
          <div class="hero-sub">${subtitle}</div>
          <div class="progress-wrap">
            <div class="progress-head">
              <span>Uso atual</span>
              <strong>${safePercent.toFixed(1)}%</strong>
            </div>
            <div class="progress">
              <div class="progress-bar" style="width:${safePercent}%;background:${status.color}"></div>
            </div>
          </div>
          <div class="metric-list">
            ${details.map(item => `
              <div class="metric-row">
                <span class="metric-name">${item.label}</span>
                <span class="metric-value">${item.value}</span>
              </div>
            `).join('')}
          </div>
        </section>
      `
    }

    function renderMetaCard(data) {
      return `
        <section class="card">
          <div class="card-label">Detalhes da máquina</div>
          <div class="meta-grid">
            <div class="meta-item">
              <span class="metric-name">Hostname</span>
              <div class="metric-value">${data.hostname || '—'}</div>
            </div>
            <div class="meta-item">
              <span class="metric-name">Sistema</span>
              <div class="metric-value">${data.platform || '—'}</div>
            </div>
            <div class="meta-item">
              <span class="metric-name">Arquitetura</span>
              <div class="metric-value">${data.arch || '—'}</div>
            </div>
            <div class="meta-item">
              <span class="metric-name">Uptime da VPS</span>
              <div class="metric-value">${formatUptime(data.uptime)}</div>
            </div>
            <div class="meta-item">
              <span class="metric-name">Load average</span>
              <div class="metric-value">${(data.loadavg || []).map(n => Number(n).toFixed(2)).join(' · ') || '—'}</div>
            </div>
            <div class="meta-item">
              <span class="metric-name">CPU</span>
              <div class="metric-value">${data.cpu?.cores || '—'} cores<br>${data.cpu?.model || '—'}</div>
            </div>
          </div>
        </section>
      `
    }

    function processBar(percent, color) {
      const safePercent = Math.max(0, Math.min(100, Number(percent) || 0))
      return `
        <div class="mini-bar">
          <div class="mini-bar-fill" style="width:${safePercent}%;background:${color}"></div>
        </div>
      `
    }

    function renderPm2Section(processes, totalMemory) {
      if (!processes.length) {
        return `
          <section class="card">
            <div class="section-title">
              <h2>Serviços PM2</h2>
              <span>Nenhum processo encontrado</span>
            </div>
            <div class="error-msg">Nenhum processo PM2 disponível para correlacionar com a VPS.</div>
          </section>
        `
      }

      const sorted = [...processes]
        .filter(proc => proc.pm2_env?.status === 'online')
        .sort((a, b) => (b.monit?.memory || 0) - (a.monit?.memory || 0))

      const totalPm2Memory = sorted.reduce((sum, proc) => sum + (proc.monit?.memory || 0), 0)

      return `
        <section class="card">
          <div class="section-title">
            <h2>Serviços PM2</h2>
            <span>${sorted.length} online · ${formatBytes(totalPm2Memory)} somados</span>
          </div>
          <div class="process-list">
            <div class="process-row header">
              <div>Serviço</div>
              <div>CPU</div>
              <div>RAM</div>
              <div>% RAM da VPS</div>
              <div>% CPU</div>
            </div>
            ${sorted.map(proc => {
              const status = proc.pm2_env?.status || 'unknown'
              const cpu = Number(proc.monit?.cpu || 0)
              const memory = Number(proc.monit?.memory || 0)
              const ramPercent = totalMemory > 0 ? (memory / totalMemory) * 100 : 0
              const cpuColor = loadStatusColor(cpu).color
              const ramColor = loadStatusColor(ramPercent).color

              return `
                <div class="process-row">
                  <div>
                    <div class="process-name">${proc.name || '—'}</div>
                    <div class="process-status">PID ${proc.pid || '—'} · ${status}</div>
                  </div>
                  <div class="process-metric">
                    <strong>${cpu.toFixed(1)}%</strong>
                    <span>uso atual</span>
                  </div>
                  <div class="process-metric">
                    <strong>${formatBytes(memory)}</strong>
                    <span>memória residente</span>
                  </div>
                  <div class="process-metric">
                    <strong>${ramPercent.toFixed(2)}%</strong>
                    ${processBar(ramPercent, ramColor)}
                  </div>
                  <div class="process-metric">
                    <strong>${cpu.toFixed(1)}%</strong>
                    ${processBar(cpu, cpuColor)}
                  </div>
                </div>
              `
            }).join('')}
          </div>
        </section>
      `
    }

    function renderDockerSection(containers, totalMemory) {
      if (!containers.length) {
        return `
          <section class="card">
            <div class="section-title">
              <h2>Containers Docker</h2>
              <span>Nenhum container encontrado</span>
            </div>
            <div class="error-msg">Nenhum container Docker disponível para correlacionar com a VPS.</div>
          </section>
        `
      }

      const sorted = [...containers]
        .sort((a, b) => (b.memoryUsedBytes || 0) - (a.memoryUsedBytes || 0))

      const totalDockerMemory = sorted.reduce((sum, item) => sum + Number(item.memoryUsedBytes || 0), 0)

      return `
        <section class="card">
          <div class="section-title">
            <h2>Containers Docker</h2>
            <span>${sorted.length} containers · ${formatBytes(totalDockerMemory)} somados</span>
          </div>
          <div class="process-list">
            <div class="process-row header">
              <div>Container</div>
              <div>CPU</div>
              <div>RAM</div>
              <div>% RAM da VPS</div>
              <div>% CPU</div>
            </div>
            ${sorted.map(container => {
              const name = container.Name || container.Names || '—'
              const id = (container.ID || '').slice(0, 12)
              const cpu = Number(container.cpuPercent || 0)
              const memory = Number(container.memoryUsedBytes || 0)
              const ramPercent = totalMemory > 0 ? (memory / totalMemory) * 100 : 0
              const cpuColor = loadStatusColor(cpu).color
              const ramColor = loadStatusColor(ramPercent).color

              return `
                <div class="process-row">
                  <div>
                    <div class="process-name">${name}</div>
                    <div class="process-status">${id || 'sem id'} · ${container.Status || container.State || '—'}</div>
                  </div>
                  <div class="process-metric">
                    <strong>${cpu.toFixed(1)}%</strong>
                    <span>uso atual</span>
                  </div>
                  <div class="process-metric">
                    <strong>${formatBytes(memory)}</strong>
                    <span>de ${formatBytes(container.memoryLimitBytes || 0)}</span>
                  </div>
                  <div class="process-metric">
                    <strong>${ramPercent.toFixed(2)}%</strong>
                    ${processBar(ramPercent, ramColor)}
                  </div>
                  <div class="process-metric">
                    <strong>${cpu.toFixed(1)}%</strong>
                    ${processBar(cpu, cpuColor)}
                  </div>
                </div>
              `
            }).join('')}
          </div>
        </section>
      `
    }

    function renderSystemProcessesSection(processes, totalMemory) {
      if (!processes.length) {
        return `
          <section class="card">
            <div class="section-title">
              <h2>Processos da VPS</h2>
              <span>Nenhum processo encontrado</span>
            </div>
            <div class="error-msg">Nenhum processo do sistema disponível para análise.</div>
          </section>
        `
      }

      return `
        <section class="card">
          <div class="section-title">
            <h2>Processos mais pesados</h2>
            <span>${processes.length} por memória residente</span>
          </div>
          <div class="process-list">
            <div class="process-row header">
              <div>Processo</div>
              <div>CPU</div>
              <div>RAM</div>
              <div>% RAM da VPS</div>
              <div>% CPU</div>
            </div>
            ${processes.map(proc => {
              const cpu = Number(proc.cpuPercent || 0)
              const memory = Number(proc.memoryBytes || 0)
              const ramPercent = totalMemory > 0 ? (memory / totalMemory) * 100 : 0
              const cpuColor = loadStatusColor(cpu).color
              const ramColor = loadStatusColor(ramPercent).color

              return `
                <div class="process-row">
                  <div>
                    <div class="process-name">${proc.command || '—'}</div>
                    <div class="process-status">PID ${proc.pid || '—'} · PPID ${proc.ppid || '—'} · ${proc.args || '—'}</div>
                  </div>
                  <div class="process-metric">
                    <strong>${cpu.toFixed(1)}%</strong>
                    <span>uso atual</span>
                  </div>
                  <div class="process-metric">
                    <strong>${formatBytes(memory)}</strong>
                    <span>${Number(proc.memoryPercent || 0).toFixed(2)}% do host</span>
                  </div>
                  <div class="process-metric">
                    <strong>${ramPercent.toFixed(2)}%</strong>
                    ${processBar(ramPercent, ramColor)}
                  </div>
                  <div class="process-metric">
                    <strong>${cpu.toFixed(1)}%</strong>
                    ${processBar(cpu, cpuColor)}
                  </div>
                </div>
              `
            }).join('')}
          </div>
        </section>
      `
    }

    async function load() {
      try {
        const [resourceRes, pm2Res, dockerStatsRes, processRes] = await Promise.all([
          fetch('/api/resources'),
          fetch('/api/pm2'),
          fetch('/api/docker-stats'),
          fetch('/api/processes')
        ])
        const data = await resourceRes.json()
        const pm2Data = pm2Res.ok ? await pm2Res.json() : []
        const dockerStatsData = dockerStatsRes.ok ? await dockerStatsRes.json() : []
        const processData = processRes.ok ? await processRes.json() : []

        if (!resourceRes.ok || data.error) {
          throw new Error(data.error || 'falha ao carregar recursos')
        }

        const cpuUsage = Number(data.cpu?.usagePercent || 0)
        const memUsage = Number(data.memory?.usagePercent || 0)
        const diskUsage = Number(data.disk?.percent || 0)
        const pm2Procs = Array.isArray(pm2Data) ? pm2Data : []
        const dockerStats = Array.isArray(dockerStatsData) ? dockerStatsData : []
        const systemProcesses = Array.isArray(processData) ? processData : []

        const cpuCard = renderUsageCard(
          'CPU',
          cpuUsage,
          `${data.cpu?.cores || 0} cores disponíveis`,
          [
            { label: 'Modelo', value: data.cpu?.model || '—' },
            { label: 'Load avg', value: (data.loadavg || []).map(n => Number(n).toFixed(2)).join(' · ') || '—' }
          ]
        )

        const memoryCard = renderUsageCard(
          'Memória RAM',
          memUsage,
          `${formatBytes(data.memory?.used)} usados de ${formatBytes(data.memory?.total)}`,
          [
            { label: 'Usado', value: formatBytes(data.memory?.used) },
            { label: 'Livre', value: formatBytes(data.memory?.free) }
          ]
        )

        const diskCard = renderUsageCard(
          'Disco raiz',
          diskUsage,
          `${formatBytes(data.disk?.used)} usados em ${data.disk?.mount || '/'}`,
          [
            { label: 'Total', value: formatBytes(data.disk?.total) },
            { label: 'Disponível', value: formatBytes(data.disk?.available) }
          ]
        )

        document.getElementById('content').innerHTML = `
          <div class="top-grid">
            ${cpuCard}
            ${renderMetaCard(data)}
          </div>
          <div class="grid">
            ${memoryCard}
            ${diskCard}
            <section class="card">
              <div class="card-label">Resumo rápido</div>
              <div class="metric-list">
                <div class="metric-row">
                  <span class="metric-name">Última coleta</span>
                  <span class="metric-value">${new Date(data.timestamp).toLocaleString('pt-BR')}</span>
                </div>
                <div class="metric-row">
                  <span class="metric-name">CPU atual</span>
                  <span class="metric-value">${cpuUsage.toFixed(1)}%</span>
                </div>
                <div class="metric-row">
                  <span class="metric-name">RAM atual</span>
                  <span class="metric-value">${memUsage.toFixed(1)}%</span>
                </div>
                <div class="metric-row">
                  <span class="metric-name">Disco atual</span>
                  <span class="metric-value">${diskUsage.toFixed(1)}%</span>
                </div>
              </div>
            </section>
          </div>
          <div class="stack">
            ${renderSystemProcessesSection(systemProcesses, Number(data.memory?.total || 0))}
            ${renderPm2Section(pm2Procs, Number(data.memory?.total || 0))}
            ${renderDockerSection(dockerStats, Number(data.memory?.total || 0))}
          </div>
        `

        document.getElementById('host-line').textContent = `${data.hostname} · ${data.platform}`
        document.getElementById('last-update').textContent =
          'Atualizado às ' + new Date().toLocaleTimeString('pt-BR')

        const highest = Math.max(cpuUsage, memUsage, diskUsage)
        document.getElementById('status-dot').style.background =
          highest >= 85 ? '#ef4444' : highest >= 65 ? '#f59e0b' : '#22c55e'
      } catch (error) {
        document.getElementById('content').innerHTML =
          `<div class="error-msg">Erro ao carregar recursos da VPS: ${error.message}</div>`
      }
    }

    document.getElementById('btn-refresh').addEventListener('click', load)
    load()
    setInterval(load, 10000)
  </script>
</body>
</html>
